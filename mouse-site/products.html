<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NovaMouse — Products</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/mouse-site/">NovaMouse</a>
      <nav class="nav">
        <a href="/mouse-site/">Home</a>
        <a href="/mouse-site/products.html">Products</a>
        <a href="/mouse-site/admin.html">Admin</a>
        <a class="btn-outline" href="/mouse-site/cart.html" id="cart-link">Cart (<span id="cart-count">0</span>)</a>
      </nav>
      <button id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation">☰</button>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <h1>All Mice</h1>
        <p class="lede">Filter by type or search by name.</p>

        <div class="filters">
          <input id="search" placeholder="Search products..." />
          <select id="filter-type">
            <option value="">All types</option>
            <option>Wireless</option>
            <option>Wired</option>
            <option>Ergonomic</option>
          </select>
          <select id="sort">
            <option value="default">Sort</option>
            <option value="price-asc">Price: Low → High</option>
            <option value="price-desc">Price: High → Low</option>
          </select>
        </div>

        <div id="product-grid" class="product-grid" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="brand-col">
        <a class="brand" href="/mouse-site/">NovaMouse</a>
        <p>© <span id="year"></span> NovaMouse. All rights reserved.</p>
      </div>
      <div class="links-col">
        <a href="/mouse-site/">Home</a>
        <a href="/mouse-site/admin.html">Admin</a>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
